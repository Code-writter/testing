# 1. System Settings & Colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# 2. Input & Mouse Controls
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g mouse on

# 3. Intuitive Window Splitting
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 4. Modern Visual Aesthetics 
set -g status-position top
set -g status-style bg=default,fg=white
set -g status-left "#[fg=cyan,bold][ #S ] "
set -g status-left-length 30
set -g status-right "#[fg=colour240]%Y-%m-%d #[fg=white]%H:%M"
set -g window-status-format "#[fg=colour240] #I:#W "
set -g window-status-current-format "#[fg=black,bold,bg=cyan] #I:#W "
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=cyan
